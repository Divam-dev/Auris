services:
  # --------------------------------
  # Lavalink (Audio Engine)
  # --------------------------------
  lavalink:
    profiles: [lavalink, all]
    container_name: auris_lavalink
    image: ghcr.io/lavalink-devs/lavalink:latest
    restart: unless-stopped
    environment:
      - _JAVA_OPTIONS=-Xmx2G # Limits Java memory usage to 2GB
      - SERVER_PORT=2333
    volumes:
      - ./lavalink/application.yml:/opt/Lavalink/application.yml
      - ./lavalink/plugins/:/opt/Lavalink/plugins/
    networks:
      - auris_network
    ports:
      - "2333:2333"
    healthcheck:
      test: 'curl -H "Authorization: $${LAVALINK_AUTH:-youshallnotpass}" -s http://localhost:2333/version || exit 1'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # --------------------------------
  # Auris (Discord Bot)
  # --------------------------------
  bot:
    profiles: [auris, all]
    container_name: auris_bot
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      lavalink:
        condition: service_healthy
        restart: true
        required: false
    networks:
      - auris_network

  # --------------------------------
  # Watchtower (Auto-updater)
  # --------------------------------
  watchtower:
    image: containrrr/watchtower
    container_name: auris_watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 86400

networks:
  auris_network:
    name: auris_network